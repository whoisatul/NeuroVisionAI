<svg width="100%" viewBox="0 0 680 980" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: Arial, sans-serif; fill: #1a1a1a; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; font-weight: 400; fill: #444; }

    /* Data layer - gray */
    .data-outer { fill: #F1EFE8; stroke: #888780; }
    .data-box   { fill: #D3D1C7; stroke: #5F5E5A; }

    /* Model layer */
    .model-outer   { fill: #F1EFE8; stroke: #888780; }
    .encoder-box   { fill: #FAEEDA; stroke: #BA7517; }
    .bottleneck-box{ fill: #FAECE7; stroke: #993C1D; }
    .decoder-box   { fill: #E1F5EE; stroke: #0F6E56; }
    .metrics-box   { fill: #EEEDFE; stroke: #534AB7; }

    /* Backend layer - purple */
    .backend-outer { fill: #EEEDFE; stroke: #534AB7; }
    .backend-box   { fill: #CECBF6; stroke: #3C3489; }

    /* Frontend layer - teal */
    .frontend-outer { fill: #E1F5EE; stroke: #0F6E56; }
    .frontend-box   { fill: #9FE1CB; stroke: #085041; }

    /* Arrows */
    .arr { stroke: #444; stroke-width: 1; fill: none; marker-end: url(#arrow); }
    .leader { stroke: #888; stroke-width: 0.5; stroke-dasharray: 5 4; fill: none; }
    .skip { stroke: #888; stroke-width: 1; stroke-dasharray: 5 4; fill: none; marker-end: url(#arrow); }
  </style>
</defs>

<!-- ── DATA LAYER ── -->
<rect class="data-outer" x="30" y="30" width="620" height="110" rx="14" stroke-width="0.5"/>
<text class="th" x="340" y="62" text-anchor="middle">Data layer — BraTS 2021</text>

<rect class="data-box" x="60" y="74" width="160" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="140" y="93" text-anchor="middle">BraTS 2021</text>
<text class="ts" x="140" y="111" text-anchor="middle">1,251 patient volumes</text>

<rect class="data-box" x="260" y="74" width="160" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="93" text-anchor="middle">Slice extraction</text>
<text class="ts" x="340" y="111" text-anchor="middle">48,627 valid slices</text>

<rect class="data-box" x="460" y="74" width="160" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="540" y="93" text-anchor="middle">FLAIR only</text>
<text class="ts" x="540" y="111" text-anchor="middle">Skip &lt;50 tumor pixels</text>

<line x1="220" y1="98" x2="258" y2="98" class="arr"/>
<line x1="420" y1="98" x2="458" y2="98" class="arr"/>

<!-- data → model -->
<line x1="340" y1="140" x2="340" y2="166" class="arr"/>
<text class="ts" x="350" y="158">training split</text>

<!-- ── MODEL LAYER ── -->
<rect class="model-outer" x="30" y="168" width="620" height="350" rx="14" stroke-width="0.5"/>
<text class="th" x="340" y="192" text-anchor="middle">Model layer — U-Net (~7.8M params)</text>

<!-- Encoder -->
<rect class="encoder-box" x="56" y="210" width="148" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="130" y="230" text-anchor="middle">Input</text>
<text class="ts" x="130" y="248" text-anchor="middle">128×128×1 grayscale</text>

<rect class="encoder-box" x="56" y="288" width="148" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="130" y="308" text-anchor="middle">Encoder block 1</text>
<text class="ts" x="130" y="326" text-anchor="middle">32 filters → MaxPool</text>

<rect class="encoder-box" x="56" y="366" width="148" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="130" y="386" text-anchor="middle">Encoder block 2</text>
<text class="ts" x="130" y="404" text-anchor="middle">64 filters → MaxPool</text>

<rect class="encoder-box" x="56" y="444" width="148" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="130" y="464" text-anchor="middle">Encoder block 3</text>
<text class="ts" x="130" y="482" text-anchor="middle">128 filters → MaxPool</text>

<line x1="130" y1="262" x2="130" y2="286" class="arr"/>
<line x1="130" y1="340" x2="130" y2="364" class="arr"/>
<line x1="130" y1="418" x2="130" y2="442" class="arr"/>

<!-- Bottleneck -->
<rect class="bottleneck-box" x="266" y="400" width="148" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="420" text-anchor="middle">Bottleneck</text>
<text class="ts" x="340" y="438" text-anchor="middle">256 filters, 16×16</text>

<line x1="204" y1="470" x2="264" y2="430" class="arr"/>

<!-- Decoder -->
<rect class="decoder-box" x="476" y="444" width="148" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="550" y="464" text-anchor="middle">Decoder block 1</text>
<text class="ts" x="550" y="482" text-anchor="middle">Upsample + skip 128</text>

<rect class="decoder-box" x="476" y="366" width="148" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="550" y="386" text-anchor="middle">Decoder block 2</text>
<text class="ts" x="550" y="404" text-anchor="middle">Upsample + skip 64</text>

<rect class="decoder-box" x="476" y="288" width="148" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="550" y="308" text-anchor="middle">Decoder block 3</text>
<text class="ts" x="550" y="326" text-anchor="middle">Upsample + skip 32</text>

<rect class="decoder-box" x="476" y="210" width="148" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="550" y="230" text-anchor="middle">Output</text>
<text class="ts" x="550" y="248" text-anchor="middle">Conv2D 1×1 sigmoid</text>

<line x1="550" y1="442" x2="550" y2="420" class="arr"/>
<line x1="550" y1="364" x2="550" y2="342" class="arr"/>
<line x1="550" y1="286" x2="550" y2="264" class="arr"/>

<line x1="414" y1="430" x2="474" y2="470" class="arr"/>

<!-- Skip connections -->
<path class="skip" d="M204 314 Q340 314 474 392"/>
<path class="skip" d="M204 392 Q340 370 474 470"/>
<path class="skip" d="M204 236 Q340 236 474 314"/>
<text class="ts" x="340" y="248" text-anchor="middle" fill="#888">skip connections</text>

<!-- Metrics badge -->
<rect class="metrics-box" x="232" y="484" width="216" height="28" rx="8" stroke-width="0.5"/>
<text class="ts" x="340" y="502" text-anchor="middle" fill="#3C3489">Val Dice 93.74% · Loss 0.073 · ~7.8M params</text>

<!-- model → backend -->
<line x1="340" y1="518" x2="340" y2="544" class="arr" stroke-width="1.2"/>
<text class="ts" x="352" y="534">binary mask + logits</text>

<!-- ── BACKEND LAYER ── -->
<rect class="backend-outer" x="30" y="546" width="620" height="220" rx="14" stroke-width="0.5"/>
<text class="th" x="340" y="570" text-anchor="middle">Backend layer — FastAPI + Python</text>

<rect class="backend-box" x="246" y="588" width="188" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="607" text-anchor="middle">FastAPI server</text>
<text class="ts" x="340" y="625" text-anchor="middle">Async multipart upload</text>

<line x1="246" y1="612" x2="190" y2="660" class="arr"/>
<line x1="434" y1="612" x2="490" y2="660" class="arr"/>

<rect class="backend-box" x="56" y="660" width="180" height="88" rx="8" stroke-width="0.5"/>
<text class="th" x="146" y="680" text-anchor="middle">2D pipeline</text>
<text class="ts" x="146" y="698" text-anchor="middle">OpenCV preprocessing</text>
<text class="ts" x="146" y="714" text-anchor="middle">Z-score normalise</text>
<text class="ts" x="146" y="730" text-anchor="middle">Resize → 128×128</text>

<rect class="backend-box" x="444" y="660" width="180" height="88" rx="8" stroke-width="0.5"/>
<text class="th" x="534" y="680" text-anchor="middle">3D NIfTI pipeline</text>
<text class="ts" x="534" y="698" text-anchor="middle">Nibabel volume load</text>
<text class="ts" x="534" y="714" text-anchor="middle">Slice extract + filter</text>
<text class="ts" x="534" y="730" text-anchor="middle">Resize → 128×128</text>

<line x1="146" y1="748" x2="248" y2="736" class="arr"/>
<line x1="534" y1="748" x2="432" y2="736" class="arr"/>

<rect class="backend-box" x="250" y="718" width="180" height="36" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="731" text-anchor="middle">Sigmoid → threshold 0.5</text>
<text class="ts" x="340" y="747" text-anchor="middle">Binary mask generation</text>

<!-- backend → frontend -->
<line x1="340" y1="766" x2="340" y2="792" class="arr" stroke-width="1.2"/>
<text class="ts" x="352" y="782">JSON: mask, Dice, bounds</text>

<!-- ── FRONTEND LAYER ── -->
<rect class="frontend-outer" x="30" y="794" width="620" height="164" rx="14" stroke-width="0.5"/>
