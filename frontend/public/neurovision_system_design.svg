<rect class="frontend-box" x="56" y="834" width="136" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="124" y="853" text-anchor="middle">Upload UI</text>
<text class="ts" x="124" y="871" text-anchor="middle">PNG / NIfTI input</text>

<rect class="frontend-box" x="212" y="834" width="136" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="280" y="853" text-anchor="middle">Overlay viewer</text>
<text class="ts" x="280" y="871" text-anchor="middle">Real-time mask render</text>

<rect class="frontend-box" x="368" y="834" width="136" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="436" y="853" text-anchor="middle">Metrics dashboard</text>
<text class="ts" x="436" y="871" text-anchor="middle">Recharts: Dice, loss</text>

<rect class="frontend-box" x="524" y="834" width="100" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="574" y="853" text-anchor="middle">Animations</text>
<text class="ts" x="574" y="871" text-anchor="middle">Framer Motion</text>

<!-- Footer labels -->
<text class="ts" x="340" y="910" text-anchor="middle" fill="#666">HTTP multipart POST ↑  ·  NumPy array 128×128×1 → model ↑</text>
<text class="ts" x="340" y="930" text-anchor="middle" fill="#666">← JSON response: mask bounds · Dice score · overlay</text>

